name: Build & Upload APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      ANDROID_HOME: /usr/local/lib/android/sdk
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Load .env ─────────────────────────────────────────────────────────
      - name: Load .env values
        id: dotenv
        run: |
          while IFS= read -r line; do
            line="${line%%#*}"
            line="${line// /}"
            [[ -z "$line" ]] && continue
            key="${line%%=*}"
            val="${line#*=}"
            echo "${key}=${val}" >> "$GITHUB_OUTPUT"
          done < .env

      # ── Java ──────────────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── Gradle ────────────────────────────────────────────────────────────
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'
          cache-read-only: false

      # ── Install missing Android SDK components (cached) ───────────────────
      - name: Cache Android SDK components
        uses: actions/cache@v4
        id: sdk-cache
        with:
          path: |
            /usr/local/lib/android/sdk/platforms/android-34
            /usr/local/lib/android/sdk/build-tools/34.0.0
          key: android-sdk-components-api34-bt34.0.0
          restore-keys: android-sdk-components-

      - name: Install Android SDK components (if not cached)
        if: steps.sdk-cache.outputs.cache-hit != 'true'
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            --sdk_root=$ANDROID_HOME

      # ── Cache Gradle dependencies ──────────────────────────────────────────
      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle', 'gradle.properties') }}
          restore-keys: gradle-

      # ── Build ──────────────────────────────────────────────────────────────
      - name: Build debug APK
        run: gradle assembleDebug --no-daemon --parallel --build-cache

      - name: Build release APK
        run: gradle assembleRelease --no-daemon --parallel --build-cache

      # ── Upload APKs ────────────────────────────────────────────────────────
      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.dotenv.outputs.APK_NAME }}-debug
          path: app/build/outputs/apk/debug/${{ steps.dotenv.outputs.APK_NAME }}-debug.apk
          retention-days: 30

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.dotenv.outputs.APK_NAME }}-release
          path: app/build/outputs/apk/release/${{ steps.dotenv.outputs.APK_NAME }}-release.apk
          retention-days: 30
